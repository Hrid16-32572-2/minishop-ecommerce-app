<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniShop Admin Dashboard</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body data-page="admin-dashboard">
  <main class="shell">
    <section class="panel">
      <div class="row-between">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>Catalog Control</h1>
        </div>
        <a class="button button-secondary" href="./index.html">Back to Storefront</a>
      </div>
      <form id="add-product-form" class="stack">
        <h2>Add Product</h2>
        <label>
          Name
          <input type="text" name="name" required>
        </label>
        <label>
          Description
          <input type="text" name="description">
        </label>
        <label>
          Price
          <input type="number" step="0.01" min="0.01" name="price" required>
        </label>
        <label>
          Stock
          <input type="number" min="0" step="1" name="stock_quantity" required>
        </label>
        <label>
          Image URL
          <input type="url" name="image_url">
        </label>
        <button class="button" type="submit">Add Product</button>
      </form>
      <div id="admin-products" class="grid"></div>
      <p id="admin-message" class="message"></p>
    </section>
  </main>
  <script src="./js/api.js"></script>
  <script src="./js/admin.js"></script>
</body>
</html>
